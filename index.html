<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex,nofollow">
<title>Project .5 - Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0B1F3A;--mid:#1A3655;--steel:#2B5080;--blue:#4A8BC4;--sky:#6b9bd1;--off:#F5F7FA;--body:#334155;--grey:#94A3B8;--green:#1B7A32;--amber:#B25B00;--red:#B21F1F;--font:'Poppins','Helvetica Neue',Helvetica,Arial,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);color:var(--body);background:#dfe4ea;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1000px;margin:0 auto;background:var(--off);min-height:100vh;}
.header{background:var(--navy);color:#fff;padding:18px 34px;display:flex;justify-content:space-between;align-items:center;}
.brandlogo{height:50px;width:auto;display:block;}
.doc-tag{font-size:10px;font-weight:500;letter-spacing:2.5px;color:var(--blue);text-transform:uppercase;}
.content{padding:26px 34px 34px;}
.tag{font-size:10px;font-weight:500;letter-spacing:2.5px;color:var(--blue);text-transform:uppercase;}
.divider{width:58px;height:3px;background:var(--blue);border-radius:2px;margin:7px 0 14px;}
h1{font-weight:700;font-size:30px;color:var(--navy);text-transform:uppercase;line-height:1;}
h2{font-size:13px;font-weight:700;letter-spacing:.8px;color:var(--navy);text-transform:uppercase;margin:22px 0 2px;}
h2+.divider{margin:5px 0 11px;}
.sub{font-size:13px;color:var(--mid);margin-top:7px;}.meta{font-size:11px;color:var(--grey);margin-top:5px;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:24px;}
.choice{background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:26px;cursor:pointer;border-top:4px solid var(--blue);}
.choice:hover{box-shadow:0 8px 20px rgba(11,31,58,.10);}
.choice h3{font-size:18px;color:var(--navy);margin-bottom:6px;}.choice p{font-size:12.5px;}.choice .ic{font-size:30px;margin-bottom:8px;}
.btn{display:inline-block;background:var(--navy);color:#fff;border:none;border-radius:5px;padding:10px 18px;font-family:var(--font);font-size:12px;font-weight:600;letter-spacing:.4px;cursor:pointer;text-transform:uppercase;}
.btn.alt{background:#fff;color:var(--navy);border:1.5px solid var(--navy);}
.navrow{display:flex;gap:10px;margin-bottom:6px;}.link{color:var(--steel);font-size:11px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.4px;}
ol.steps{margin:6px 0 0 0;padding-left:20px;}ol.steps li{font-size:12.5px;line-height:1.55;margin:6px 0;}ol.steps li b{color:var(--navy);}
.panel{background:#fff;border:1px solid #e2e8f0;border-radius:7px;padding:16px 18px;margin-top:10px;}
.drop{border:2px dashed #b9c6d6;border-radius:8px;padding:22px;text-align:center;background:#fbfcfd;}
.field{margin:10px 0;}.field label{font-size:11px;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px;}
.field input{font-family:var(--font);padding:8px 11px;border:1px solid #cbd5e1;border-radius:5px;font-size:13px;}
.msg{font-size:12px;padding:9px 13px;border-radius:5px;margin-top:10px;}.msg.ok{background:#e3f3e8;color:var(--green);}.msg.warn{background:#fff3e0;color:var(--amber);}.msg.err{background:#fde6e6;color:var(--red);}
.lock{max-width:420px;margin:60px auto;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:30px;text-align:center;}
.lock .ic{font-size:34px;}.lock h2{margin:10px 0 4px;}.lock input{width:100%;text-align:center;margin-top:12px;}
.band{background:var(--navy);color:#fff;border-radius:8px;padding:15px 20px;margin:14px 0;display:flex;gap:30px;flex-wrap:wrap;align-items:center;}
.band .lbl{font-size:9px;letter-spacing:1.5px;color:var(--blue);text-transform:uppercase;margin-bottom:3px;}.band .big{font-size:30px;font-weight:700;line-height:1;}.band .s{font-size:10px;color:#dbe6f2;}
table{border-collapse:collapse;width:100%;font-size:12px;}
th,td{border:1px solid #d8e0ea;padding:7px 9px;text-align:right;}th:first-child,td:first-child{text-align:left;}
th{background:var(--navy);color:#fff;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.3px;}
tbody tr:nth-child(even){background:#eef2f7;}td b{color:var(--navy);}
.pill{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.4px;padding:2px 8px;border-radius:11px;text-transform:uppercase;}
.pill.green{background:#e3f3e8;color:var(--green);}.pill.amber{background:#fff3e0;color:var(--amber);}.pill.red{background:#fde6e6;color:var(--red);}.pill.grey{background:#eef2f7;color:#5a7080;}
.mixrow{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:11px;}.mixname{width:96px;font-weight:600;color:var(--navy);}.mixbar{flex:1;height:16px;border-radius:3px;overflow:hidden;display:flex;}
.legend{display:flex;flex-wrap:wrap;gap:14px;font-size:10.5px;margin:6px 0 2px;}.legend span{display:inline-flex;align-items:center;gap:5px;}.dot{width:10px;height:10px;border-radius:2px;display:inline-block;}
.footer{background:var(--mid);color:#cdd8e6;padding:11px 34px;font-size:10px;display:flex;justify-content:space-between;}.footer .r{color:var(--blue);font-weight:500;}
.note{font-size:11px;color:var(--grey);line-height:1.5;background:#eef3f9;border-left:4px solid var(--steel);border-radius:3px;padding:11px 14px;margin-top:12px;}.note b{color:var(--mid);}
</style></head>

// ---- crypto (AES-256-GCM + PBKDF2) ----
function b64(b){var s="";for(var i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s);}
function ub64(t){var s=atob(t);var a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
function dk(pass,salt){return crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]).then(function(km){return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:250000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);});}
function encryptData(obj,pass){var salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));return dk(pass,salt).then(function(k){return crypto.subtle.encrypt({name:"AES-GCM",iv:iv},k,new TextEncoder().encode(JSON.stringify(obj)));}).then(function(ct){return {v:1,salt:b64(salt),iv:b64(iv),ct:b64(new Uint8Array(ct))};});}
function decryptData(blob,pass){return dk(pass,ub64(blob.salt)).then(function(k){return crypto.subtle.decrypt({name:"AES-GCM",iv:ub64(blob.iv)},k,ub64(blob.ct));}).then(function(pt){return JSON.parse(new TextDecoder().decode(pt));});}

// ---- CSV + classify (verified to match the baseline) ----
function parseCSV(text){text=text.replace(/^﻿/,"");var nl=text.indexOf("\n");var fl=text.slice(0,nl<0?text.length:nl);var delim=(fl.split("\t").length>fl.split(",").length)?"\t":",";var rows=[],field="",row=[],inq=false;for(var i=0;i<text.length;i++){var c=text[i];if(inq){if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else inq=false;}else field+=c;}else{if(c==='"')inq=true;else if(c===delim){row.push(field);field="";}else if(c==="\n"){row.push(field);rows.push(row);row=[];field="";}else if(c==="\r"){}else field+=c;}}if(field.length||row.length){row.push(field);rows.push(row);}return rows;}
function classify(name,ag,sgc){var nm=(name||"").toLowerCase(),agl=(ag||"").toLowerCase(),t=agl+" "+(sgc||"").toLowerCase();
 if(t.indexOf("discount")>=0||t.indexOf("promo")>=0||agl.indexOf("adj")===0)return"discount";
 if(t.indexOf("modifier")>=0||t.indexOf("mods")>=0)return"mixer";
 if(nm.indexOf("mixer")>=0||nm.indexOf("on the rocks")>=0)return"mixer";
 if(["tall glass","glasses","glass","ice","jug"].indexOf(nm)>=0||/^(1 sugar|2 sugar|3 sugar|skim|extra shot|decaf|soy|oat|almond)/.test(nm))return"mixer";
 if(t.indexOf("tea")>=0||t.indexOf("coffee")>=0||/(espresso|latte|cappu|capuc|flat white|long black|short black|piccolo|macchiato|mocha|chai|double shot)/.test(nm))return"teacoffee";
 if(/(table sparkling|table water|sparkling water|still water|jug water)/.test(nm))return"water";
 if(agl.indexOf("package")>=0){if(/(zero|0%|non alc|non-alc|heaps normal|free time|ultra low)/.test(nm))return"nonalc";if(/(& dry|& cola|and dry|bundy|canadian club|cc &|jim beam|jack |cruiser|udl|premix|& soda)/.test(nm))return"spirits";if(/(shiraz|pinot|chardonnay|sauv|prosecco|moscato|riesling|rose|cabernet|merlot)/.test(nm))return"wine";return"beer";}
 if(t.indexOf("breakfast")>=0||/(fresh oj|orange juice|apple juice|pineapple|cranberry|juice)/.test(nm))return"nonalc";
 if(t.indexOf("cocktail")>=0||t.indexOf("cock/mock")>=0||t.indexOf("mock")>=0){if(/(mock|virgin|non alc|non-alc|zero|0%|nojito)/.test(nm))return"nonalc";return"cocktails";}
 if(/(wine|prosecco|champagne|sparkling|moscato|riesling|shiraz|pinot|sauv|cabernet|merlot|sangria)/.test(t))return"wine";
 if(/(beer|cider|draught|draft|lager| ale|tap beer|stout|pilsner|cerveza)/.test(t))return"beer";
 if(t.indexOf("spirit")>=0||t.indexOf("liquor")>=0||/(whisk|vodka| gin |rum|tequila|bourbon|liqueur|aperol|negroni|scotch)/.test(nm))return"spirits";
 if(/(non-alc|non alc|soft|juice|soda|mineral|mocktail)/.test(t)||/(lemonade|coke|pepsi|lemon lime|bitters|red bull|mineral|kombucha|ginger beer|soda)/.test(nm))return"nonalc";
 return"bevother";}
var DRINK=["cocktails","wine","beer","spirits","nonalc","bevother"],ALCC=["cocktails","wine","beer","spirits"];
function idx(h,n){for(var i=0;i<h.length;i++){if((h[i]||"").trim().toLowerCase()===n)return i;}return -1;}
function computeLS(text){var rows=parseCSV(text),h=rows[0];var iN=idx(h,"item name"),iA=idx(h,"accounting group"),iQ=idx(h,"total quantity"),iNet=idx(h,"net amount"),iG=idx(h,"total amount"),iD=idx(h,"discounted amount"),iS=idx(h,"statistic group category");var U={},N={},gross=0,disc=0;for(var r=1;r<rows.length;r++){var row=rows[r];if(row.length<=iS)continue;var cat=(row[iS]||"").trim().toLowerCase(),ag=(row[iA]||"").trim();var isBev=(cat.indexOf("beverage")===0||ag.toUpperCase().indexOf("BEV")>=0);if(!(isBev||ag.toLowerCase().indexOf("discount")>=0))continue;var q=parseFloat(row[iQ])||0,n=parseFloat(row[iNet])||0,c=classify(row[iN],ag,row[iS]);if(iD>=0)disc+=parseFloat(row[iD])||0;if(isBev&&iG>=0)gross+=parseFloat(row[iG])||0;if(c==="discount")continue;if(DRINK.indexOf(c)<0)continue;var nm=(row[iN]||"").trim().toLowerCase();if(n<=0||ag.toLowerCase().indexOf("parent")>=0||nm==="no drink"||nm==="do not make")continue;U[c]=(U[c]||0)+q;N[c]=(N[c]||0)+n;}var du=0,alc=0,net=0;DRINK.forEach(function(k){du+=U[k]||0;net+=N[k]||0;});ALCC.forEach(function(k){alc+=U[k]||0;});var mix={};CATS.forEach(function(k){mix[k]=du>0?+(100*(U[k]||0)/du).toFixed(1):0;});var dp=gross>0?+(100*disc/gross).toFixed(2):0;return{du:du,alc:alc,net:net,mix:mix,disc:dp};}
function computeCovers(text){var rows=parseCSV(text),h=rows[0];var iS=idx(h,"reservation status"),iC=idx(h,"booked covers");var cov=0;for(var r=1;r<rows.length;r++){var row=rows[r];if(row.length<=Math.max(iS,iC))continue;if((row[iS]||"").toLowerCase().indexOf("complete")>=0)cov+=parseFloat(row[iC])||0;}return cov;}
function venueFromName(s){s=(s||"").toLowerCase();if(s.indexOf("pincho")>=0)return"Pincho Disco";if(s.indexOf("collective")>=0)return"The Collective";if(s.indexOf("cinder")>=0)return"Cinder";if(s.indexOf("watermark")>=0)return"Watermark";if(s.indexOf("ember")>=0)return"Ember";return null;}

 if(!inp.files.length){pv.innerHTML='<div class="msg warn">Choose the CSV files first.</div>';return;}
 if(!lab){pv.innerHTML='<div class="msg warn">Set the week-ending date first.</div>';return;}
 var files=[].slice.call(inp.files);var done=0;var ls={},sr={};
 files.forEach(function(f){var rd=new FileReader();rd.onload=function(){var text=rd.result;var rows=parseCSV(text);var h=(rows[0]||[]).map(function(x){return(x||"").trim().toLowerCase();});var isLS=h.indexOf("total quantity")>=0&&h.indexOf("accounting group")>=0;var isSR=h.indexOf("booked covers")>=0&&h.indexOf("venue name")>=0;if(isLS){var v=venueFromName(f.name);if(v)ls[v]=text;}else if(isSR){var iv=h.indexOf("venue name");var vn="";for(var r=1;r<rows.length;r++){if(rows[r][iv]){vn=rows[r][iv];break;}}var v2=venueFromName(vn)||venueFromName(f.name);if(v2)sr[v2]=text;}done++;if(done===files.length)finishProcess(ls,sr,lab,pv);};rd.readAsText(f);});}
function finishProcess(ls,sr,lab,pv){var res=[];VENUES.forEach(function(v){if(ls[v]&&sr[v]){var L=computeLS(ls[v]);var cov=computeCovers(sr[v]);if(cov>0)res.push({venue:v,dpc:+(L.du/cov).toFixed(2),alc:+(L.alc/cov).toFixed(2),spc:+(L.net/cov).toFixed(2),avg:+(L.net/L.du).toFixed(2),disc:L.disc,mix:L.mix,covers:Math.round(cov)});}});
 if(!res.length){pv.innerHTML='<div class="msg err">No venue had both a drinks file and a covers file. Check both were exported per venue.</div>';return;}
 PENDING={rows:res,label:lab};var html='<div class="msg ok">Calculated '+res.length+' venue(s) for week ending '+esc(lab)+'. Review, then add the week.</div>';
 html+='<table><thead><tr><th>Venue</th><th>Covers</th><th>Drinks/cover</th><th>Alc/cover</th><th>$/cover</th><th>$/drink</th><th>Disc %</th></tr></thead><tbody>';
 res.forEach(function(x){html+='<tr><td><b>'+x.venue+'</b></td><td>'+x.covers.toLocaleString()+'</td><td>'+x.dpc.toFixed(2)+'</td><td>'+x.alc.toFixed(2)+'</td><td>$'+x.spc.toFixed(2)+'</td><td>$'+x.avg.toFixed(2)+'</td><td>'+(x.disc||0).toFixed(2)+'%</td></tr>';});
 html+='</tbody></table><div style="margin-top:12px"><span class="btn" onclick="addWeek()">Add this week</span></div>';pv.innerHTML=html;}
function addWeek(){if(!PENDING)return;PENDING.rows.forEach(function(x){DATA.venues[x.venue].weeks.push({label:PENDING.label,date:PENDING.label,dpc:x.dpc,alc:x.alc,spc:x.spc,avg:x.avg,disc:x.disc,mix:x.mix,covers:x.covers});});PENDING=null;go("dashboard");}
function publishEncrypted(){var m=document.getElementById("pubmsg");var p=PASS;
 if(!p){var a=document.getElementById("pw1").value,b=document.getElementById("pw2").value;if(a.length<8){m.innerHTML='<div class="msg warn">Choose a password of at least 8 characters.</div>';return;}if(a!==b){m.innerHTML='<div class="msg warn">Passwords do not match.</div>';return;}p=a;}
 if(!BIN_ID||BIN_ID.indexOf("REPLACE")>=0){m.innerHTML='<div class="msg err">Live storage is not set up yet (BIN_ID in the page).</div>';return;}
 m.innerHTML='<div class="msg">Encrypting and publishing...</div>';
 encryptData(DATA,p).then(function(blob){PASS=p;return fetch(API+BIN_ID,{method:"PUT",headers:(function(){var hd={"Content-Type":"application/json","X-Bin-Versioning":"true"};if(ACCESS_KEY&&ACCESS_KEY.indexOf("REPLACE")<0)hd["X-Access-Key"]=ACCESS_KEY;return hd;})(),body:JSON.stringify(blob)});}).then(function(r){if(!r.ok)throw r.status;m.innerHTML='<div class="msg ok">Published. The live dashboard now shows this update - anyone with the password sees it on refresh.</div>';}).catch(function(e){m.innerHTML='<div class="msg err">Could not publish ('+(e||"error")+'). Check the connection and try again.</div>';});}

// ---- views ----
function lockedView(){return '<div class="lock"><div class="ic">&#128274;</div><h2>Project .5 Dashboard</h2><div class="sub">This dashboard is encrypted. Enter the password to view.</div><input type="password" id="pw" placeholder="Password" onkeydown="if(event.key===\'Enter\')unlock()"><div style="margin-top:14px"><span class="btn" onclick="unlock()">Unlock</span></div><div id="lockmsg"></div><div style="margin-top:18px;font-size:10.5px;color:var(--grey)">Setting up or replacing the baseline? <label class="link" style="cursor:pointer">import a data file<input type="file" accept=".json" style="display:none" onchange="importData(this)"></label></div></div>';}
function nodataView(){return '<div class="tag">Project .5</div><div class="divider"></div><h1>Set up the dashboard</h1><div class="sub">No data published yet. Import the baseline once, set a password, then publish - it saves to the live store for everyone.</div>'
 +'<div class="panel"><h2 style="margin-top:0">Import baseline</h2><div class="divider"></div><p style="font-size:12px">Load the <b>data.seed.json</b> file once to populate the baseline, then go to Update &rarr; Publish to push it live.</p><div style="margin-top:10px"><input type="file" accept=".json" onchange="importData(this)"></div></div>';}
function homeView(){return '<div class="tag">Project .5 &middot; +0.5 Beverage Program</div><div class="divider"></div><h1>Live Dashboard</h1><div class="sub">Drinks per customer across all participating venues, tracked against the +0.5 target.</div>'
 +'<div class="choices"><div class="choice" onclick="go(\'update\')"><div class="ic">&#128228;</div><h3>Update with this week&#39;s data</h3><p>For Mary &mdash; upload the weekly venue exports; the page recalculates, then you hit publish. It saves straight to the live dashboard. Instructions inside.</p><div style="margin-top:14px"><span class="btn">Update data</span></div></div>'
 +'<div class="choice" onclick="go(\'dashboard\')" style="border-top-color:var(--steel)"><div class="ic">&#128202;</div><h3>View the dashboard</h3><p>Full stats &mdash; drinks per cover, trend vs target, sales mix and weekly history for every venue.</p><div style="margin-top:14px"><span class="btn alt">View dashboard</span></div></div></div>'
 +'<div class="note"><b>Encrypted &amp; private:</b> the data is AES-256 encrypted in the cloud store - only this password opens it. The page itself holds no figures.</div>';}
function updateView(){var setpw=PASS?'<p style="font-size:12px">Using the password you unlocked with.</p>':'<div class="field"><label>Set a password</label><input type="password" id="pw1" placeholder="At least 8 characters"></div><div class="field"><label>Confirm password</label><input type="password" id="pw2"></div>';
 return '<div class="navrow"><span class="link" onclick="go(\'home\')">&#8592; Home</span><span class="link" onclick="go(\'dashboard\')">View dashboard &#8594;</span></div><div class="tag">Weekly update</div><div class="divider"></div><h1>Update the data</h1><div class="sub">For Mary &mdash; about 5 minutes every Monday.</div>'
 +'<div class="panel"><h2 style="margin-top:0">Step 1 &middot; Export from each venue</h2><div class="divider"></div><ol class="steps"><li><b>Lightspeed (drinks):</b> Back Office &rarr; each venue (and the Cinder &amp; Ember locations) &rarr; <b>Reports &rarr; Product mix report</b> &rarr; date range <b>last Mon&ndash;Sun</b> &rarr; <b>Export &rarr; CSV</b>.</li><li><b>SevenRooms (covers):</b> Reporting &rarr; <b>Reservations Export</b> &rarr; each venue &rarr; same week &rarr; status <b>Complete</b> &rarr; <b>Export &rarr; CSV</b>.</li></ol></div>'
 +'<div class="panel"><h2 style="margin-top:0">Step 2 &middot; Upload &amp; calculate</h2><div class="divider"></div><div class="field"><label>Week ending (Sunday)</label><input type="date" id="weeklabel"></div><div class="drop">Select every CSV for the week (all venues).<br><input type="file" id="files" multiple accept=".csv,.txt"></div><div style="margin-top:12px"><span class="btn" onclick="processFiles()">Calculate</span></div><div id="preview"></div></div>'
 +'<div class="panel"><h2 style="margin-top:0">Step 3 &middot; Publish</h2><div class="divider"></div><p style="font-size:12px">This encrypts the updated data and saves it straight to the live dashboard - no files, no downloads. Anyone with the password sees it on their next refresh.</p>'+setpw+'<div style="margin-top:10px"><span class="btn" onclick="publishEncrypted()">Publish live</span></div><div id="pubmsg"></div></div>';}
function svgTrend(){var W=940,H=300,pL=46,pR=150,pT=18,pB=34,ymin=1.0,ymax=3.6;var maxw=0;VENUES.forEach(function(v){maxw=Math.max(maxw,DATA.venues[v].weeks.length-1);});if(maxw<1)maxw=1;
 function X(i){return pL+i/maxw*(W-pL-pR);}function Y(val){return H-pB-(val-ymin)/(ymax-ymin)*(H-pT-pB);}
 var s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="Poppins,Arial,sans-serif">';
 for(var g=ymin;g<=ymax+1e-9;g+=0.5){var y=Y(g);s+='<line x1="'+pL+'" y1="'+y.toFixed(1)+'" x2="'+(W-pR)+'" y2="'+y.toFixed(1)+'" stroke="#e2e8f0"/><text x="'+(pL-6)+'" y="'+(y+3).toFixed(1)+'" font-size="9" fill="#94A3B8" text-anchor="end">'+g.toFixed(1)+'</text>';}
 for(var i=0;i<=maxw;i++){s+='<text x="'+X(i).toFixed(1)+'" y="'+(H-pB+15)+'" font-size="9" fill="#94A3B8" text-anchor="middle">'+(i===0?"Base":("W"+i))+'</text>';}
 var ly=pT+4;VENUES.forEach(function(v){var c=VCOL[v];var w=DATA.venues[v].weeks;var pts=[];for(var i=0;i<w.length;i++){pts.push(X(i).toFixed(1)+","+Y(w[i].dpc).toFixed(1));}if(w.length>1)s+='<polyline points="'+pts.join(" ")+'" fill="none" stroke="'+c+'" stroke-width="2.5"/>';for(var i2=0;i2<w.length;i2++){s+='<circle cx="'+X(i2).toFixed(1)+'" cy="'+Y(w[i2].dpc).toFixed(1)+'" r="3.2" fill="'+c+'"/>';}s+='<circle cx="'+(W-pR+14)+'" cy="'+ly+'" r="4" fill="'+c+'"/><text x="'+(W-pR+22)+'" y="'+(ly+4)+'" font-size="10" fill="#334155">'+v+'</text>';ly+=19;});
 return s+'</svg>';}
function mixBlock(){var h='<div class="legend">';CATS.forEach(function(c){h+='<span><span class="dot" style="background:'+CATCOL[c]+'"></span>'+c+'</span>';});h+='</div>';VENUES.forEach(function(v){var m=curw(v).mix;h+='<div class="mixrow"><div class="mixname">'+v+'</div><div class="mixbar">';CATS.forEach(function(c){var pc=m[c]||0;if(pc>0)h+='<div title="'+c+' '+pc+'%" style="width:'+pc+'%;background:'+CATCOL[c]+'"></div>';});h+='</div></div>';});return h;}
function dashboardView(){
 var gBaseCov=0,gBaseW=0,prize=0;VENUES.forEach(function(v){var b=DATA.venues[v].baseline;gBaseCov+=b.covers||0;gBaseW+=b.dpc*(b.covers||0);prize+=(b.covers||0)*UPLIFT*(b.avg||0);});var gBase=gBaseCov?gBaseW/gBaseCov:0;
 var gCov=0,gW=0;VENUES.forEach(function(v){var c=curw(v);gCov+=c.covers||0;gW+=c.dpc*(c.covers||0);});var gdpc=gCov?gW/gCov:gBase;
 var anyWeek=DATA.venues[VENUES[0]].weeks.length>1;var lastLabel=anyWeek?curw(VENUES[0]).label:"Baseline only";
 var h='<div class="navrow"><span class="link" onclick="go(\'home\')">&#8592; Home</span><span class="link" onclick="go(\'update\')">Update data &#8594;</span></div><div class="tag">Project .5 &middot; All venues</div><div class="divider"></div><h1>Dashboard</h1>';
 h+='<div class="meta">Latest: '+esc(lastLabel)+(anyWeek?'':' &middot; upload a week to start the trend')+'</div>';
 h+='<div class="band"><div><div class="lbl">Group drinks / cover</div><div class="big">'+gdpc.toFixed(2)+'</div><div class="s">baseline '+gBase.toFixed(2)+' &middot; target '+(gBase+UPLIFT).toFixed(2)+'</div></div>'
  +'<div><div class="lbl">vs baseline</div><div class="big">'+(gdpc-gBase>=0?"+":"")+(gdpc-gBase).toFixed(2)+'</div><div class="s">of the +0.50 goal</div></div>'
  +'<div style="flex:1;min-width:200px"><div class="lbl">The goal</div><div class="s" style="font-size:11px;color:#fff">+0.5 drinks per customer &asymp; $'+(prize/1e6).toFixed(2)+'M extra gross / yr across the five venues.</div></div></div>';
 h+='<h2>By venue</h2><div class="divider"></div><div style="overflow-x:auto"><table><thead><tr><th>Venue</th><th>Drinks/cover</th><th>Baseline</th><th>Target</th><th>&Delta;</th><th>Alc/cover</th><th>$/cover</th><th>Net $/drink</th><th>Disc %</th><th>Covers</th><th>Status</th></tr></thead><tbody>';
 VENUES.forEach(function(v){var c=curw(v),b=DATA.venues[v].baseline,t=DATA.venues[v].target;var st=(DATA.venues[v].weeks.length<=1)?["Baseline set","grey"]:statusOf(c,b,t);var d=c.dpc-b.dpc;var dv=(c.disc!=null?c.disc.toFixed(2)+'%':'&ndash;');var pd=(b.avg>0&&c.avg<b.avg-0.10);h+='<tr><td><b>'+v+'</b></td><td><b>'+c.dpc.toFixed(2)+'</b></td><td>'+b.dpc.toFixed(2)+'</td><td>'+t.toFixed(2)+'</td><td>'+(d>=0?"+":"")+d.toFixed(2)+'</td><td>'+c.alc.toFixed(2)+'</td><td>$'+c.spc.toFixed(2)+'</td><td'+(pd?' style="color:var(--red)"':'')+'>$'+c.avg.toFixed(2)+'</td><td>'+dv+'</td><td>'+(c.covers||0).toLocaleString()+'</td><td><span class="pill '+st[1]+'">'+st[0]+'</span></td></tr>';});
 h+='</tbody></table></div>';
 h+='<h2>Drinks per cover &mdash; trend vs target</h2><div class="divider"></div><div class="panel">'+svgTrend()+'<div class="note" style="margin-top:8px">Weekly drinks per cover; targets (baseline + 0.50) are in the table. A lift only counts if value holds: if drinks/cover rises while Net $/drink falls (shown red), the venue is buying volume with discount - that flags amber, not green. Discount % is a watch line; today it is low everywhere except premium wine at Cinder. Beverage cost is not in the POS export, so true margin/cover still needs Finance&#39;s GP.</div></div>';
 h+='<h2>Current sales mix</h2><div class="divider"></div><div class="panel">'+mixBlock()+'</div>';
 var maxw=0;VENUES.forEach(function(v){maxw=Math.max(maxw,DATA.venues[v].weeks.length);});
 h+='<h2>Weekly history</h2><div class="divider"></div><div class="panel"><table><thead><tr><th>Week</th>';VENUES.forEach(function(v){h+='<th>'+v+'</th>';});h+='</tr></thead><tbody>';
 for(var i=0;i<maxw;i++){var lbl=i===0?"Baseline":null;VENUES.forEach(function(v){var w=DATA.venues[v].weeks;if(i<w.length&&lbl===null)lbl=w[i].label;});h+='<tr><td><b>'+esc(lbl||("Week "+i))+'</b></td>';VENUES.forEach(function(v){var w=DATA.venues[v].weeks;h+='<td>'+(i<w.length?w[i].dpc.toFixed(2):"&ndash;")+'</td>';});h+='</tr>';}
 h+='</tbody></table></div><div style="margin-top:14px"><span class="btn" onclick="go(\'update\')">Update with new data</span></div>';
 return h;}
function render(){var el=document.getElementById("view");el.innerHTML=view==="locked"?lockedView():view==="nodata"?nodataView():view==="update"?updateView():view==="dashboard"?dashboardView():view==="loading"?'<div class="sub" style="text-align:center;margin:60px">Loading...</div>':homeView();}
boot();
</script>
</body></html>
